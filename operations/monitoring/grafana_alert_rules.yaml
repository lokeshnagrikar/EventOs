# Grafana Alerting Rules & Thresholds Configuration for EventOS

apiVersion: 1
groups:
  - name: eventos-platform-alerts
    rules:
      # 1. High CPU Utilization Alert
      - alert: HostCpuUtilizationHigh
        expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (container) * 100 > 85
        for: 5m
        labels:
          severity: warning
          tier: platform
        annotations:
          summary: "High CPU utilization on container: {{ $labels.container }}"
          description: "Container CPU usage has exceeded 85% for more than 5 minutes (current value: {{ $value }}%)."

      # 2. High Memory Utilization Alert
      - alert: HostMemoryUtilizationHigh
        expr: (container_memory_working_set_bytes{container!=""} / container_spec_memory_limit_bytes{container!=""}) * 100 > 85
        for: 5m
        labels:
          severity: warning
          tier: platform
        annotations:
          summary: "High Memory usage on container: {{ $labels.container }}"
          description: "Container memory working set has exceeded 85% of its limit for more than 5 minutes (current value: {{ $value }}%)."

      # 3. High API Error Rate Alert
      - alert: Http5xxErrorRateHigh
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (uri, outcome) / sum(rate(http_server_requests_seconds_count[5m])) by (uri, outcome) * 100 > 2
        for: 2m
        labels:
          severity: critical
          tier: api
        annotations:
          summary: "High HTTP 5xx error rate on URI: {{ $labels.uri }}"
          description: "API Gateway or microservice endpoints are returning >2% server errors over a 2-minute rolling window (current rate: {{ $value }}%)."

      # 4. Latency Spikes Alert (95th Percentile)
      - alert: HttpLatencySpikeP95
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, uri)) > 1.5
        for: 3m
        labels:
          severity: warning
          tier: api
        annotations:
          summary: "API Latency spike on URI: {{ $labels.uri }}"
          description: "The 95th percentile of response latency has exceeded 1.5 seconds over 3 minutes (current p95 latency: {{ $value }}s)."

      # 5. Hikari Connection Pool Exhaustion Alert
      - alert: DatabaseConnectionPoolExhausted
        expr: (hikaricp_connections_active / hikaricp_connections_max) * 100 > 90
        for: 1m
        labels:
          severity: critical
          tier: database
        annotations:
          summary: "HikariCP pool near exhaustion on service: {{ $labels.application }}"
          description: "Active database connection pool utilization is above 90% for more than 1 minute (current pool usage: {{ $value }}%). Potential pool starvation or long-running transaction blockages."

---
# Notification Integration Route Config
receivers:
  - name: slack-notifications
    slack_configs:
      - channel: '#eventos-ops-alerts'
        api_url: '${SLACK_WEBHOOK_URL}' # Injected at runtime
        send_resolved: true
        title: '[{{ .Status | toUpper }}] EventOS Platform Alert'
        text: >-
          *Alert:* {{ .CommonAnnotations.summary }}
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Time:* {{ .StartsAt }}
