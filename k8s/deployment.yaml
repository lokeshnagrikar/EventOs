apiVersion: v1
kind: Namespace
metadata:
  name: eventos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eventos-config
  namespace: eventos
data:
  SPRING_PROFILES_ACTIVE: prod
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  RABBITMQ_HOST: rabbitmq-service
  RABBITMQ_PORT: "5672"
  CRM_SERVICE_URL: http://crm-service:8082/api/v1/crm
  EVENT_SERVICE_URL: http://event-service:8083/api/v1/events
  GALLERY_SERVICE_URL: http://gallery-service:8084/api/v1/gallery
  AUTH_SERVICE_URL: http://auth-service:8081/api/v1/auth
---
apiVersion: v1
kind: Secret
metadata:
  name: eventos-secrets
  namespace: eventos
type: Opaque
data:
  # Base64 encoded values for production secrets
  # JWT_SECRET_KEY: 9a4f2c8d7e6b5a3f1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
  jwt-secret: OWE0ZjJjOGQ3ZTZiNWEzZjFjMmQzZTRmNWE2YjdjOGQ5ZTBmMWEyYjNjNGQ1ZTZmN2E4YjljMGQxZTJmM2E0YjVjNmQ=
  postgres-user: ZXZlbnRvc19hZG1pbg== # eventos_admin
  postgres-password: ZXZlbnRvc19zZWN1cmVfcGFzcw== # eventos_secure_pass
  rabbitmq-user: ZXZlbnRvc19ndWVzdA== # eventos_guest
  rabbitmq-password: ZXZlbnRvc19ndWVzdF9wYXNz # eventos_guest_pass
  cloudinary-cloud-name: ZGVtbw== # demo
  cloudinary-api-key: ZGVtb19rZXk= # demo_key
  cloudinary-api-secret: ZGVtb19zZWN1cmV0 # demo_secret
---
# Persistent Volumes for Databases
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: eventos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Database Services
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: eventos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          environment:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: eventos_root
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "250m"
              memory: 256Mi
          healthCheck:
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "eventos_admin", "-d", "eventos_root"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "eventos_admin", "-d", "eventos_root"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: eventos
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: eventos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
          resources:
            limits:
              cpu: "250m"
              memory: 128Mi
            requests:
              cpu: "100m"
              memory: 64Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: eventos
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
# RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: eventos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          environment:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: rabbitmq-password
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "250m"
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: eventos
spec:
  ports:
    - port: 5672
      name: amqp
    - port: 15672
      name: management
  selector:
    app: rabbitmq
---
# Spring Boot: Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: eventos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: auth-service
          image: ghcr.io/lokeshnagrikar/eventos/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: eventos-config
          env:
            - name: POSTGRES_DB
              value: auth_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: postgres-password
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: jwt-secret
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "250m"
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: eventos
spec:
  ports:
    - port: 8081
  selector:
    app: auth-service
---
