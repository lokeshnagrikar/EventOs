  name: api-gateway
  namespace: eventos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: api-gateway
          image: ghcr.io/lokeshnagrikar/eventos/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: eventos-config
          env:
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: http://auth-service:8081
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: http://crm-service:8082
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: http://event-service:8083
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_URI
              value: http://gallery-service:8084
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: jwt-secret
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "250m"
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
