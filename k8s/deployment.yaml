  name: api-gateway
  namespace: eventos
spec:
  ports:
    - port: 8080
  selector:
    app: api-gateway
---
# Next.js Web Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: eventos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: web-frontend
          image: ghcr.io/lokeshnagrikar/eventos/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://api-gateway:8080
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "250m"
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: eventos
spec:
  ports:
    - port: 3000
  selector:
    app: web-frontend
---
# Ingress Routing Config
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventos-ingress
  namespace: eventos
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - host: eventos.local
      http:
        paths:
          # Route static page and web app traffic to Next.js
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: web-frontend
                port:
                  number: 3000
          # Route API gateway backend calls
          - path: /(api/v1)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
