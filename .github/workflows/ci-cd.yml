name: EventOS CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests=false -B
        working-directory: ./backend

  frontend-test:
    name: Frontend Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./web

      - name: Lint Frontend
        run: npm run lint
        working-directory: ./web

      - name: Build Frontend
        run: npm run build
        working-directory: ./web

  docker-dry-run:
    name: Docker Image Build Dry-Run
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/api-gateway/Dockerfile
          push: false
          tags: eventdoc/api-gateway:latest

      - name: Build Auth Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/auth-service/Dockerfile
          push: false
          tags: eventdoc/auth-service:latest
