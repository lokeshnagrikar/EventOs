name: EventOS CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java environment
      - name: Setup Java JRE 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # Compile and Test Backend microservices
      - name: Build and Test Backend Microservices
        run: |
          mvn clean package -DskipTests

      # Setup Node environment for Next.js frontend
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Web Frontend
        run: |
          cd web
          npm ci
          npm run build

  build-and-push-docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry (GHCR)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push: API Gateway
      - name: Build & Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:latest

      # Build and push: Auth Service
      - name: Build & Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:latest

      # Build and push: CRM Service
      - name: Build & Push CRM Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/crm-service
          push: true
          tags: ghcr.io/${{ github.repository }}/crm-service:latest

      # Build and push: Event Service
      - name: Build & Push Event Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/event-service
          push: true
          tags: ghcr.io/${{ github.repository }}/event-service:latest

      # Build and push: Gallery Service
      - name: Build & Push Gallery Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/gallery-service
          push: true
          tags: ghcr.io/${{ github.repository }}/gallery-service:latest

      # Build and push: Next.js Frontend
      - name: Build & Push Next.js Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
