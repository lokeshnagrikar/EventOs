name: EventOS CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks security scan for secrets in git history
      - name: Gitleaks Secrets Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Start backend services for integration tests
      - name: Start Services (PostgreSQL, Redis, RabbitMQ)
        run: |
          docker compose up -d postgres redis rabbitmq

      # Wait for services to be ready
      - name: Wait for Services to be healthy
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' eventos-postgres 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "PostgreSQL is healthy!"
              break
            fi
            echo "PostgreSQL status: $STATUS. Waiting..."
            sleep 2
          done
          
          echo "Waiting for Redis..."
          for i in {1..15}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' eventos-redis 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Redis is healthy!"
              break
            fi
            echo "Redis status: $STATUS. Waiting..."
            sleep 1
          done
          
          echo "Waiting for RabbitMQ..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' eventos-rabbitmq 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "RabbitMQ is healthy!"
              break
            fi
            echo "RabbitMQ status: $STATUS. Waiting..."
            sleep 2
          done

      # Setup Java environment
      - name: Setup Java JRE 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml

      # Compile and Test Backend microservices
      - name: Build and Test Backend Microservices
        run: |
          cd backend
          mvn clean test -B

      # Setup Node environment for Next.js frontend
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        run: |
          cd web
          npm ci

      - name: Run Web Lint
        run: |
          cd web
          npm run lint

      - name: Build Web Frontend
        run: |
          cd web
          npm run build

  build-and-push-docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase Repo Name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry (GHCR)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Load: API Gateway (to scan locally first)
      - name: Build & Load API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/api-gateway/Dockerfile
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}/api-gateway:latest

      # Scan API Gateway with Trivy
      - name: Scan API Gateway Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/api-gateway:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Build & Load: Auth Service
      - name: Build & Load Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/auth-service/Dockerfile
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}/auth-service:latest

      # Scan Auth Service with Trivy
      - name: Scan Auth Service Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/auth-service:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Build & Load: CRM Service
      - name: Build & Load CRM Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/crm-service/Dockerfile
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}/crm-service:latest

      # Scan CRM Service with Trivy
      - name: Scan CRM Service Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/crm-service:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Build & Load: Event Service
      - name: Build & Load Event Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/event-service/Dockerfile
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}/event-service:latest

      # Scan Event Service with Trivy
      - name: Scan Event Service Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/event-service:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Build & Load: Gallery Service
      - name: Build & Load Gallery Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/gallery-service/Dockerfile
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}/gallery-service:latest

      # Scan Gallery Service with Trivy
      - name: Scan Gallery Service Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/gallery-service:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Build & Load: Next.js Frontend
      - name: Build & Load Next.js Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          load: true
          tags: ghcr.io/${{ env.REPO_LC }}/frontend:latest

      # Scan Next.js Frontend with Trivy
      - name: Scan Next.js Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LC }}/frontend:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Push all scanned images to GHCR
      - name: Push Scanned Images to GHCR
        run: |
          docker push ghcr.io/${{ env.REPO_LC }}/api-gateway:latest
          docker push ghcr.io/${{ env.REPO_LC }}/auth-service:latest
          docker push ghcr.io/${{ env.REPO_LC }}/crm-service:latest
          docker push ghcr.io/${{ env.REPO_LC }}/event-service:latest
          docker push ghcr.io/${{ env.REPO_LC }}/gallery-service:latest
          docker push ghcr.io/${{ env.REPO_LC }}/frontend:latest
