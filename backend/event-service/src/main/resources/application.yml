server:
  port: 8083
  servlet:
    context-path: /api/v1/events
  tomcat:
    redirect-context-root: false

spring:
  application:
    name: event-service
  mvc:
    # Disable trailing-slash redirect (e.g. /events → /events/).
    # Without this, Spring sends a 301 with an absolute Location: http://localhost:8083/...
    # which bypasses the API Gateway proxy and causes CORS errors in the browser.
    pathmatch:
      use-suffix-pattern: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:eventos_guest}
    password: ${RABBITMQ_PASS:eventos_guest_pass}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/event_db?sslmode=disable
    username: ${POSTGRES_USER:eventos_admin}
    password: ${POSTGRES_PASSWORD:eventos_secure_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

# Security & JWT configurations
app:
  jwt:
    secret: ${JWT_SECRET_KEY:9a4f2c8d7e6b5a3f1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d}
  gateway:
    secret: ${GATEWAY_TRUST_SECRET:eventos_gateway_secure_shared_secret}

service:
  auth:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081/api/v1/auth}
  crm:
    base-url: ${CRM_SERVICE_URL:http://localhost:8082/api/v1/crm}


management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4318/v1/traces}
  tracing:
    sampling:
      probability: 1.0

resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1000
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
