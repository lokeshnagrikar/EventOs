server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: crm-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/crm/**
        - id: event-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/events/**
        - id: gallery-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/gallery/**

# Custom parameters
app:
  jwt:
    secret: ${JWT_SECRET_KEY:9a4f2c8d7e6b5a3f1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d}
